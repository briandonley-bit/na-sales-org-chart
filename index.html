<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ed; min-height: 100vh; }
  input, select, button, textarea { font-family: inherit; }
  input { background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; }
  input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
  select { background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; }
  button { font-family: inherit; cursor: pointer; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ─── Initial data ─── */

            { id: "c-vancouver", name: "Vancouver", reps: [

            ]},
            { id: "c-nyc", name: "NYC", reps: [

            { id: "c-montreal", name: "Montreal", reps: [

            ]},

          tl: { id: "tl-se", name: "TBD", role: "Team Lead" },
          cities: [

              { id: "r12", name: "Carson", role: "BDM" }, { id: "r13", name: "Danessa", role: "BDM" }, { id: "r14", name: "Aline", role: "BDM" },
            ]},
            { id: "c-orlando", name: "Orlando", reps: [
              { id: "r15", name: "Birlys", role: "BDM" }, { id: "r16", name: "Mark Conway", role: "BDM" },
            ]},
            { id: "c-atlanta", name: "Atlanta", reps: [
              { id: "r17", name: "Janeida", role: "BDM" }, { id: "r18", name: "Anthony", role: "BDM" },

const INITIAL_PHASES = [
  { id: "phase-1", label: "Current", color: "#6366f1", org: JSON.parse(JSON.stringify(BASE_ORG)) }
];

const PHASE_COLORS = ["#6366f1","#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6"];

const C = {
  blue: {
    pill: "#2563eb",
    head: { bg: "#dbeafe", border: "#93c5fd", text: "#1e3a5f", sub: "#2563eb" },
    tl:   { bg: "#bfdbfe", border: "#60a5fa", text: "#1e3a5f", sub: "#1d4ed8" },
    city: { bg: "#eff6ff", text: "#1d4ed8" },
    rep:  { bg: "#f8faff", border: "#93c5fd", text: "#1e3a5f", sub: "#2563eb" },
    cityBadge: { bg: "#dbeafe", text: "#1d4ed8" },
  },
  green: {
    pill: "#059669",
    head: { bg: "#d1fae5", border: "#6ee7b7", text: "#064e3b", sub: "#059669" },
    tl:   { bg: "#a7f3d0", border: "#34d399", text: "#064e3b", sub: "#047857" },
    city: { bg: "#f0fdf4", text: "#15803d" },
    rep:  { bg: "#f7fff9", border: "#6ee7b7", text: "#064e3b", sub: "#059669" },
    cityBadge: { bg: "#d1fae5", text: "#065f46" },
  }
};

let _id = 200;
const uid = () => "x" + (++_id);
const clone = d => JSON.parse(JSON.stringify(d));

/* ─── Modal ─── */
function Modal({ title, onClose, children }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
      <div style={{background:"#fff",borderRadius:12,padding:"24px 28px",minWidth:320,boxShadow:"0 12px 40px rgba(0,0,0,0.2)"}}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:18,color:"#111"}}>{title}</div>
        {children}
      </div>
    </div>
  );
}
function Field({ label, value, onChange, placeholder }) {
  return (
    <div style={{marginBottom:12}}>
      <div style={{fontSize:12,color:"#666",marginBottom:4}}>{label}</div>
      <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""} style={{width:"100%"}} />
    </div>
  );
}
function ModalButtons({ onCancel, onSave, saveLabel="Save" }) {
  return (
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:18}}>
      <button onClick={onCancel} style={{padding:"7px 16px",borderRadius:6,border:"1px solid #d1d5db",background:"#fff",fontSize:13}}>Cancel</button>
      <button onClick={onSave} style={{padding:"7px 16px",borderRadius:6,border:"none",background:"#1e293b",color:"#fff",fontSize:13}}>{saveLabel}</button>
    </div>
  );
}
function TwoFieldForm({ init, onSave, onCancel }) {
  const [name,setName]=useState(init.name||"");
  const [role,setRole]=useState(init.role||"");
  return (<><Field label="Name" value={name} onChange={setName}/><Field label="Role" value={role} onChange={setRole}/><ModalButtons onCancel={onCancel} onSave={()=>onSave({name,role})}/></>);
}
function RepEditForm({ init, onSave, onCancel }) {
  const [name,setName]=useState(init.name||"");
  const [role,setRole]=useState(init.role||"");
  const [tag,setTag]=useState(init.tag||null);
  return (
    <>
      <Field label="Name" value={name} onChange={setName}/>
      <Field label="Role" value={role} onChange={setRole}/>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,color:"#666",marginBottom:8}}>Colour tag</div>
        <div style={{display:"flex",gap:8}}>
          {REP_TAGS.map(t=>(
            <button key={String(t.id)} onClick={()=>setTag(t.id)}
              title={t.label}
              style={{
                width:28,height:28,borderRadius:"50%",cursor:"pointer",flexShrink:0,
                background: t.dot,
                border: tag===t.id ? "3px solid #1e293b" : "2px solid transparent",
                outline: tag===t.id ? "1px solid #fff" : "none",
                outlineOffset:"-4px",
              }}/>
          ))}
        </div>
      </div>
      <ModalButtons onCancel={onCancel} onSave={()=>onSave({name,role,tag})}/>
    </>
  );
}
function AddSRForm({ onSave, onCancel }) {
  const [name,setName]=useState(""); const [tlName,setTlName]=useState("");
  return (<><Field label="Subregion name" value={name} onChange={setName}/><Field label="Team lead (blank = TBD)" value={tlName} onChange={setTlName} placeholder="TBD"/><ModalButtons onCancel={onCancel} onSave={()=>name&&onSave({name,tlName})} saveLabel="Add"/></>);
}
function AddRepModal({ cities, onSave, onClose }) {
  const [name,setName]=useState(""); const [role,setRole]=useState("BDM");
  const [cityId,setCityId]=useState(""); const [newCity,setNewCity]=useState(""); const [useNew,setUseNew]=useState(false);
  return (
    <Modal title="Add rep" onClose={onClose}>
      <Field label="Name" value={name} onChange={setName} placeholder="Full name"/>
      <Field label="Role" value={role} onChange={setRole}/>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#666",marginBottom:4}}>City</div>
        {!useNew ? (
          <>
            <select value={cityId} onChange={e=>setCityId(e.target.value)} style={{width:"100%",marginBottom:6}}>
              <option value="">— select city —</option>
              {cities.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <button onClick={()=>setUseNew(true)} style={{fontSize:12,color:"#2563eb",background:"none",border:"none",cursor:"pointer",padding:0}}>+ Create new city</button>
          </>
        ) : (
          <>
            <input value={newCity} onChange={e=>setNewCity(e.target.value)} placeholder="City name" style={{width:"100%",marginBottom:6}}/>
            <button onClick={()=>setUseNew(false)} style={{fontSize:12,color:"#64748b",background:"none",border:"none",cursor:"pointer",padding:0}}>← Pick existing</button>
          </>
        )}
      </div>
      <ModalButtons onCancel={onClose} onSave={()=>name&&onSave({name,role,cityId:useNew?"":cityId,newCityName:useNew?newCity:""})} saveLabel="Add rep"/>
    </Modal>
  );
}

/* ─── Phase modal ─── */
function PhaseModal({ phase, onSave, onClose, onDelete, isOnly }) {
  const [label,setLabel]=useState(phase?phase.label:"");
  const [color,setColor]=useState(phase?phase.color:PHASE_COLORS[0]);
  return (
    <Modal title={phase?"Edit phase":"New phase"} onClose={onClose}>
      <Field label="Phase name (e.g. Phase 1 — July)" value={label} onChange={setLabel} placeholder="Phase 1 — July"/>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,color:"#666",marginBottom:8}}>Color</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {PHASE_COLORS.map(col=>(
            <button key={col} onClick={()=>setColor(col)} style={{width:28,height:28,borderRadius:"50%",background:col,border:color===col?"3px solid #1e293b":"2px solid transparent",cursor:"pointer"}}/>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"space-between",marginTop:18}}>
        {phase&&!isOnly ? (
          <button onClick={onDelete} style={{padding:"7px 14px",borderRadius:6,border:"none",background:"#fef2f2",color:"#ef4444",fontSize:13}}>Delete</button>
        ) : <span/>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{padding:"7px 16px",borderRadius:6,border:"1px solid #d1d5db",background:"#fff",fontSize:13}}>Cancel</button>
          <button onClick={()=>label&&onSave({label,color})} style={{padding:"7px 16px",borderRadius:6,border:"none",background:"#1e293b",color:"#fff",fontSize:13}}>{phase?"Save":"Create"}</button>
        </div>
      </div>
    </Modal>
  );
}

function DuplicateModal({ sourceLabel, phases, onSave, onClose }) {
  const [label,setLabel]=useState(sourceLabel+" (copy)");
  const [color,setColor]=useState(PHASE_COLORS[phases.length%PHASE_COLORS.length]);
  return (
    <Modal title="Duplicate phase" onClose={onClose}>
      <div style={{fontSize:13,color:"#64748b",marginBottom:16}}>Creates a copy of <strong>{sourceLabel}</strong> you can edit independently.</div>
      <Field label="New phase name" value={label} onChange={setLabel} placeholder="Phase 2 — September"/>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,color:"#666",marginBottom:8}}>Color</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {PHASE_COLORS.map(col=>(
            <button key={col} onClick={()=>setColor(col)} style={{width:28,height:28,borderRadius:"50%",background:col,border:color===col?"3px solid #1e293b":"2px solid transparent",cursor:"pointer"}}/>
          ))}
        </div>
      </div>
      <ModalButtons onCancel={onClose} onSave={()=>label&&onSave({label,color})} saveLabel="Duplicate"/>
    </Modal>
  );
}

/* ─── Rep tag colours ─── */
const REP_TAGS = [
  { id: null,      label: "No tag",              bg: null,      border: null,      dot: "#cbd5e1" },
  { id: "purple",  label: "Leadership Potential", bg: "#faf5ff", border: "#d8b4fe", dot: "#a855f7" },
  { id: "amber",   label: "Started",              bg: "#fffbeb", border: "#fcd34d", dot: "#f59e0b" },
  { id: "green",   label: "Hired",                bg: "#f0fdf4", border: "#86efac", dot: "#22c55e" },
  { id: "red",     label: "Vacant",               bg: "#fff1f2", border: "#fca5a5", dot: "#ef4444" },
];

/* ─── Rep card ─── */
function RepCard({ rep, color, cityName, onEdit, onDelete, onDragStart }) {
  const c=C[color].rep; const cb=C[color].cityBadge;
  const [hov,setHov]=useState(false);
  const tag = REP_TAGS.find(t=>t.id===rep.tag) || REP_TAGS[0];
  const hasBg = !!tag.bg;
  return (
    <div draggable onDragStart={e=>onDragStart(e,rep.id)}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        background: hov ? "#f1f5f9" : (hasBg ? tag.bg : c.bg),
        border: "1px solid "+(hasBg ? tag.border : c.border),
        borderLeft: hasBg ? "3px solid "+tag.dot : "1px solid "+c.border,
        borderRadius:7,padding:"6px 8px",marginBottom:3,display:"flex",alignItems:"center",
        justifyContent:"space-between",cursor:"grab",userSelect:"none",transition:"background 0.1s",minWidth:148
      }}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:500,color:c.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{rep.name}</div>
        <div style={{display:"flex",alignItems:"center",gap:5,marginTop:2}}>
          <span style={{fontSize:9,color:c.sub}}>{rep.role}</span>
          <span style={{fontSize:9,fontWeight:600,background:cb.bg,color:cb.text,padding:"1px 5px",borderRadius:3,letterSpacing:"0.04em"}}>{cityName}</span>
        </div>
      </div>
      <div style={{display:"flex",gap:2,opacity:hov?1:0.35,transition:"opacity 0.1s",marginLeft:6,flexShrink:0}}>
        <button onClick={()=>onEdit(rep)} title="Edit" style={{background:"none",border:"none",cursor:"pointer",padding:"2px 4px",color:"#64748b",fontSize:13}}>✎</button>
        <button onClick={()=>onDelete(rep.id)} title="Remove" style={{background:"none",border:"none",cursor:"pointer",padding:"2px 4px",color:"#94a3b8",fontSize:14}}>×</button>
      </div>
    </div>
  );
}

/* ─── City column ─── */
function CityCol({ city, color, srId, regId, onEditCity, onDeleteCity, onEditRep, onDeleteRep, onDragStart, onDrop, onCityDragStart, draggingCityId, onCityDragEnd }) {
  const c=C[color]; const [repOver,setRepOver]=useState(false);
  const isBeingDragged = draggingCityId===city.id;
  return (
    <div draggable onDragStart={e=>{e.stopPropagation();onCityDragStart(e,city.id,srId,regId);}} onDragEnd={onCityDragEnd}
      style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:164,opacity:isBeingDragged?0.35:1,transition:"opacity 0.15s",cursor:"grab"}}>
      <div style={{display:"flex",alignItems:"center",gap:3,marginBottom:5}}>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",background:c.city.bg,color:c.city.text,padding:"2px 8px",borderRadius:4,userSelect:"none"}}>
          {"⠿ "+city.name}
        </span>
        <button onClick={e=>{e.stopPropagation();onEditCity(city,srId,regId);}} title="Rename" style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:12,padding:"0 2px"}}>✎</button>
        <button onClick={e=>{e.stopPropagation();onDeleteCity(city.id,srId,regId);}} title="Remove" style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:14,padding:"0 2px"}}>×</button>
      </div>
      <div onDragOver={e=>{e.preventDefault();e.stopPropagation();setRepOver(true);}} onDragLeave={()=>setRepOver(false)}
        onDrop={e=>{e.stopPropagation();setRepOver(false);onDrop(e,city.id,srId,regId);}}
        style={{width:"100%",minHeight:36,borderRadius:7,padding:4,border:repOver?"2px dashed "+c.pill:"2px solid transparent",background:repOver?c.city.bg:"transparent",transition:"all 0.15s"}}>
        {city.reps.map(rep=>(
          <RepCard key={rep.id} rep={rep} color={color} cityName={city.name}
            onEdit={r=>onEditRep(r,city.id,srId,regId)} onDelete={id=>onDeleteRep(id,city.id,srId,regId)} onDragStart={onDragStart}/>
        ))}
        {city.reps.length===0&&<div style={{fontSize:10,color:"#94a3b8",textAlign:"center",padding:"6px 0",border:"1px dashed #e2e8f0",borderRadius:5}}>drop rep here</div>}
      </div>
    </div>
  );
}

/* ─── Subregion ─── */
function Subregion({ sr, color, regId, onEditTL, onClearTL, onDeleteSR, onAddRep, onAddCity, onEditCity, onDeleteCity, onEditRep, onDeleteRep, onDragStart, onDrop, onEditSRName, tlRef, onCityDragStart, onCityDrop, draggingCityId, onCityDragEnd }) {
  const c=C[color]; const [cityOver,setCityOver]=useState(false);
  const repCount = sr.cities.reduce((n,city)=>n+city.reps.length, 0);
  const badgeBg = color==="blue" ? "#bfdbfe" : "#a7f3d0";
  const badgeColor = c.tl.sub;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.09em",textTransform:"uppercase",color:c.head.sub,border:"1px solid "+c.pill,borderRadius:4,padding:"2px 9px"}}>{sr.name}</span>
        <button onClick={()=>onEditSRName(sr.id,regId)} title="Rename" style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:12,padding:"0 2px"}}>✎</button>
        <button onClick={()=>onDeleteSR(sr.id,regId)} title="Remove subregion" style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:13,padding:"0 2px"}}>×</button>
      </div>
      <div style={{width:1,height:7,background:"#d1d5db"}}/>
      <div ref={tlRef} style={{position:"relative",background:c.tl.bg,border:"1px solid "+c.tl.border,borderRadius:8,padding:"8px 16px",textAlign:"center",minWidth:138}}>
        <div style={{fontSize:12,fontWeight:600,color:c.tl.text}}>{sr.tl.name}</div>
        <div style={{fontSize:10,color:c.tl.sub}}>{sr.tl.role}</div>
        <div style={{display:"flex",justifyContent:"center",marginTop:4}}>
          <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",background:badgeBg,color:badgeColor,fontSize:9,fontWeight:700,borderRadius:8,padding:"1px 6px",letterSpacing:"0.02em"}}>
            {repCount} {repCount===1?"rep":"reps"}
          </span>
        </div>
        <div style={{position:"absolute",top:4,right:4,display:"flex",gap:2}}>
          <button onClick={()=>onEditTL(sr.id,regId)} title="Edit TL" style={{background:"none",border:"none",cursor:"pointer",color:c.tl.sub,fontSize:12,padding:"1px 3px"}}>✎</button>
          {sr.tl.name!=="TBD"&&(
            <button onClick={()=>onClearTL(sr.id,regId)} title="Remove team lead (keeps cities and reps)" style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:13,padding:"1px 3px",lineHeight:1}}>×</button>
          )}
        </div>
      </div>
      <div style={{width:1,height:10,background:"#d1d5db"}}/>
      <div onDragOver={e=>{e.preventDefault();setCityOver(true);}} onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setCityOver(false);}}
        onDrop={e=>{e.preventDefault();setCityOver(false);onCityDrop(e,sr.id,regId);}}
        style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",padding:cityOver?"8px":"2px",border:cityOver?"2px dashed "+c.pill:"2px solid transparent",borderRadius:10,background:cityOver?c.city.bg:"transparent",transition:"all 0.15s",minWidth:170,minHeight:80}}>
        {sr.cities.map(city=>(
          <CityCol key={city.id} city={city} color={color} srId={sr.id} regId={regId}
            onEditCity={onEditCity} onDeleteCity={onDeleteCity} onEditRep={onEditRep} onDeleteRep={onDeleteRep}
            onDragStart={onDragStart} onDrop={onDrop}
            onCityDragStart={onCityDragStart} draggingCityId={draggingCityId} onCityDragEnd={onCityDragEnd}/>
        ))}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:164,justifyContent:"flex-start"}}>
          <div style={{height:25,marginBottom:5}}/>
          <button onClick={()=>onAddCity(sr.id,regId)}
            style={{width:"100%",minHeight:60,borderRadius:7,border:"2px dashed "+c.pill,background:"transparent",color:c.city.text,fontSize:12,fontWeight:500,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,opacity:0.6,transition:"opacity 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.opacity="1"} onMouseLeave={e=>e.currentTarget.style.opacity="0.6"}>
            <span style={{fontSize:20,lineHeight:1}}>+</span>
            <span style={{fontSize:10,letterSpacing:"0.04em"}}>Add city</span>
          </button>
        </div>
        {sr.cities.length===0&&<div style={{fontSize:11,color:"#94a3b8",padding:"20px 12px",textAlign:"center",width:"100%"}}>Drop a city here</div>}
      </div>
      <button onClick={()=>onAddRep(sr.id,regId)} style={{marginTop:8,fontSize:11,color:c.head.sub,background:c.city.bg,border:"1px solid "+c.pill,borderRadius:5,padding:"3px 12px"}}>+ Add rep</button>
    </div>
  );
}

/* ─── Org view ─── */
function OrgView({ org, onUpdate }) {
  const dragId = useRef(null);
  const dragCityRef = useRef(null);
  const [draggingCityId,setDraggingCityId]=useState(null);
  const [editNode,setEditNode]=useState(null);
  const [addRepCtx,setAddRepCtx]=useState(null);
  const [tlCtx,setTlCtx]=useState(null);
  const containerRef=useRef(null);
  const gmRef=useRef(null);
  const headRefs=useRef({});
  const tlRefs=useRef({});
  const [lines,setLines]=useState([]);

  const upd = fn => onUpdate(prev => { const d=clone(prev); fn(d); return d; });

  useEffect(() => {
    if(!containerRef.current||!gmRef.current) return;
    const base=containerRef.current.getBoundingClientRect();
    const newLines=[];
    const rel = el => {
      if(!el) return null;
      const r=el.getBoundingClientRect();
      return { top:r.top-base.top, bottom:r.bottom-base.top, cx:(r.left+r.right)/2-base.left };
    };
    const gmBox=rel(gmRef.current);
    if(!gmBox) return;
    const headBoxes=Object.entries(headRefs.current).map(([id,el])=>({id,box:rel(el)})).filter(x=>x.box);
    if(headBoxes.length>0) {
      const midY=gmBox.bottom+(Math.min(...headBoxes.map(h=>h.box.top))-gmBox.bottom)/2;
      newLines.push({x1:gmBox.cx,y1:gmBox.bottom,x2:gmBox.cx,y2:midY,k:"gm-d"});
      if(headBoxes.length>1) {
        const xs=headBoxes.map(h=>h.box.cx);
        newLines.push({x1:Math.min(...xs),y1:midY,x2:Math.max(...xs),y2:midY,k:"gm-h"});
      }
      headBoxes.forEach(({id,box})=>newLines.push({x1:box.cx,y1:midY,x2:box.cx,y2:box.top,k:"gm-hd-"+id}));
    }
    headBoxes.forEach(({id:regId,box:hb})=>{
      const tls=Object.entries(tlRefs.current).filter(([k])=>k.startsWith(regId+"--")).map(([k,el])=>({srId:k.split("--")[1],box:rel(el)})).filter(x=>x.box);
      if(!tls.length) return;
      const midY=hb.bottom+(Math.min(...tls.map(t=>t.box.top))-hb.bottom)/2;
      newLines.push({x1:hb.cx,y1:hb.bottom,x2:hb.cx,y2:midY,k:"hd-d-"+regId});
      if(tls.length>1){const xs=tls.map(t=>t.box.cx);newLines.push({x1:Math.min(...xs),y1:midY,x2:Math.max(...xs),y2:midY,k:"hd-h-"+regId});}
      tls.forEach(({srId,box})=>newLines.push({x1:box.cx,y1:midY,x2:box.cx,y2:box.top,k:"hd-tl-"+regId+"-"+srId}));
    });
    setLines(newLines);
  });

  /* Rep drag */
  const handleDragStart=(e,repId)=>{dragId.current=repId;e.dataTransfer.setData("dragtype","rep");e.dataTransfer.effectAllowed="move";};
  const handleDrop=(e,cityId,srId,regId)=>{
    e.preventDefault();
    if(e.dataTransfer.getData("dragtype")!=="rep") return;
    const id=dragId.current; if(!id) return;
    upd(d=>{
      let rep=null;
      d.regions.forEach(r=>r.subregions.forEach(s=>s.cities.forEach(c=>{const i=c.reps.findIndex(x=>x.id===id);if(i!==-1){rep=c.reps.splice(i,1)[0];}})));
      if(!rep) return;
      const city=d.regions.find(r=>r.id===regId)?.subregions.find(s=>s.id===srId)?.cities.find(c=>c.id===cityId);
      if(city) city.reps.push(rep);
    }); dragId.current=null;
  };

  /* City drag */
  const handleCityDragStart=(e,cityId,srId,regId)=>{dragCityRef.current={cityId,srId,regId};setDraggingCityId(cityId);e.dataTransfer.setData("dragtype","city");e.dataTransfer.effectAllowed="move";};
  const handleCityDrop=(e,targetSrId,targetRegId)=>{
    e.preventDefault();
    if(e.dataTransfer.getData("dragtype")!=="city") return;
    const src=dragCityRef.current; if(!src||src.srId===targetSrId) {setDraggingCityId(null);dragCityRef.current=null;return;}
    upd(d=>{
      const srcSR=d.regions.find(r=>r.id===src.regId)?.subregions.find(s=>s.id===src.srId);
      if(!srcSR) return;
      const idx=srcSR.cities.findIndex(c=>c.id===src.cityId); if(idx===-1) return;
      const [city]=srcSR.cities.splice(idx,1);
      const tgtSR=d.regions.find(r=>r.id===targetRegId)?.subregions.find(s=>s.id===targetSrId);
      if(tgtSR) tgtSR.cities.push(city);
    });
    setDraggingCityId(null); dragCityRef.current=null;
  };
  const handleCityDragEnd=()=>{setDraggingCityId(null);dragCityRef.current=null;};

  /* Edits */
  const handleEditRep=(rep,cityId,srId,regId)=>setEditNode({type:"rep",rep:clone(rep),cityId,srId,regId});
  const saveRep=({name,role,tag})=>{const{rep:o,cityId,srId,regId}=editNode;upd(d=>{const c=d.regions.find(r=>r.id===regId)?.subregions.find(s=>s.id===srId)?.cities.find(c=>c.id===cityId);const rep=c?.reps.find(r=>r.id===o.id);if(rep){rep.name=name;rep.role=role;rep.tag=tag||null;}});setEditNode(null);};
  const handleDeleteRep=(repId,cityId,srId,regId)=>upd(d=>{const c=d.regions.find(r=>r.id===regId)?.subregions.find(s=>s.id===srId)?.cities.find(c=>c.id===cityId);if(c)c.reps=c.reps.filter(r=>r.id!==repId);});
  const handleEditCity=(city,srId,regId)=>setEditNode({type:"city",city:clone(city),srId,regId});
  const saveCity=(name)=>{const{city,srId,regId}=editNode;upd(d=>{const c=d.regions.find(r=>r.id===regId)?.subregions.find(s=>s.id===srId)?.cities.find(c=>c.id===city.id);if(c)c.name=name;});setEditNode(null);};
  const handleDeleteCity=(cityId,srId,regId)=>upd(d=>{const sr=d.regions.find(r=>r.id===regId)?.subregions.find(s=>s.id===srId);if(sr)sr.cities=sr.cities.filter(c=>c.id!==cityId);});
  const handleEditTL=(srId,regId)=>{const sr=org.regions.find(r=>r.id===regId)?.subregions.find(s=>s.id===srId);setTlCtx({srId,regId,name:sr.tl.name,role:sr.tl.role});};
  const saveTL=({name,role})=>{upd(d=>{const sr=d.regions.find(r=>r.id===tlCtx.regId)?.subregions.find(s=>s.id===tlCtx.srId);if(sr){sr.tl.name=name;sr.tl.role=role;}});setTlCtx(null);};
  const handleClearTL=(srId,regId)=>upd(d=>{const sr=d.regions.find(r=>r.id===regId)?.subregions.find(s=>s.id===srId);if(sr)sr.tl={...sr.tl,name:"TBD",role:"Team Lead"};});
  const handleDeleteSR=(srId,regId)=>upd(d=>{const reg=d.regions.find(r=>r.id===regId);if(reg)reg.subregions=reg.subregions.filter(s=>s.id!==srId);});
  const handleAddSR=(regId)=>setEditNode({type:"addSR",regId});
  const saveAddSR=({name,tlName})=>{upd(d=>{const reg=d.regions.find(r=>r.id===editNode.regId);if(reg)reg.subregions.push({id:uid(),name,tl:{id:uid(),name:tlName||"TBD",role:"Team Lead"},cities:[]});});setEditNode(null);};
  const handleAddRep=(srId,regId)=>setAddRepCtx({srId,regId});
  const handleAddCity=(srId,regId)=>setEditNode({type:"addCity",srId,regId,cityName:""});
  const saveAddCity=(name)=>{upd(d=>{const sr=d.regions.find(r=>r.id===editNode.regId)?.subregions.find(s=>s.id===editNode.srId);if(sr)sr.cities.push({id:uid(),name,reps:[]});});setEditNode(null);};
  const saveAddRep=({name,role,cityId,newCityName})=>{upd(d=>{const sr=d.regions.find(r=>r.id===addRepCtx.regId)?.subregions.find(s=>s.id===addRepCtx.srId);if(!sr)return;const rep={id:uid(),name,role:role||"BDM"};if(newCityName){sr.cities.push({id:uid(),name:newCityName,reps:[rep]});}else if(cityId){const city=sr.cities.find(c=>c.id===cityId);if(city)city.reps.push(rep);}else if(sr.cities.length>0){sr.cities[0].reps.push(rep);}else{sr.cities.push({id:uid(),name:"Unassigned",reps:[rep]});}});setAddRepCtx(null);};
  const handleEditGM=()=>setEditNode({type:"gm",name:org.gm.name,role:org.gm.role});
  const saveGM=({name,role})=>{upd(d=>{d.gm.name=name;d.gm.role=role;});setEditNode(null);};
  const handleEditHead=(regId)=>{const reg=org.regions.find(r=>r.id===regId);setEditNode({type:"head",regId,name:reg.head.name,role:reg.head.role});};
  const saveHead=({name,role})=>{upd(d=>{const reg=d.regions.find(r=>r.id===editNode.regId);if(reg){reg.head.name=name;reg.head.role=role;}});setEditNode(null);};
  const handleEditRegionName=(regId)=>{const reg=org.regions.find(r=>r.id===regId);setEditNode({type:"regionName",regId,val:reg.name});};
  const saveRegionName=(name)=>{upd(d=>{const reg=d.regions.find(r=>r.id===editNode.regId);if(reg)reg.name=name;});setEditNode(null);};
  const handleEditSRName=(srId,regId)=>{const sr=org.regions.find(r=>r.id===regId)?.subregions.find(s=>s.id===srId);setEditNode({type:"srName",srId,regId,val:sr?.name||""});};
  const saveSRName=(name)=>{upd(d=>{const sr=d.regions.find(r=>r.id===editNode.regId)?.subregions.find(s=>s.id===editNode.srId);if(sr)sr.name=name;});setEditNode(null);};

  /* Headcount helpers */
  const srRepCount = sr => sr.cities.reduce((n,c)=>n+c.reps.length,0);
  const regRepCount = reg => reg.subregions.reduce((n,sr)=>n+srRepCount(sr),0);
  const totalRepCount = () => org.regions.reduce((n,reg)=>n+regRepCount(reg),0);

  const HCBadge = ({count, bg, color}) => (
    <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",background:bg,color:color,fontSize:10,fontWeight:700,borderRadius:10,padding:"1px 7px",marginTop:4,letterSpacing:"0.02em"}}>
      {count} {count===1?"rep":"reps"}
    </span>
  );

  const renderModal=()=>{
    if(tlCtx) return <Modal title="Edit team lead" onClose={()=>setTlCtx(null)}><TwoFieldForm init={{name:tlCtx.name,role:tlCtx.role}} onSave={saveTL} onCancel={()=>setTlCtx(null)}/></Modal>;
    if(addRepCtx){const sr=org.regions.find(r=>r.id===addRepCtx.regId)?.subregions.find(s=>s.id===addRepCtx.srId);return <AddRepModal cities={sr?.cities||[]} onSave={saveAddRep} onClose={()=>setAddRepCtx(null)}/>;}
    if(!editNode) return null;
    if(editNode.type==="rep") return (
      <Modal title="Edit rep" onClose={()=>setEditNode(null)}>
        <RepEditForm init={{name:editNode.rep.name,role:editNode.rep.role,tag:editNode.rep.tag||null}} onSave={saveRep} onCancel={()=>setEditNode(null)}/>
      </Modal>
    );
    if(editNode.type==="city") return <Modal title="Rename city" onClose={()=>setEditNode(null)}><Field label="City name" value={editNode.city.name} onChange={v=>setEditNode(p=>({...p,city:{...p.city,name:v}}))}/><ModalButtons onCancel={()=>setEditNode(null)} onSave={()=>saveCity(editNode.city.name)}/></Modal>;
    if(editNode.type==="gm") return <Modal title="Edit GM" onClose={()=>setEditNode(null)}><TwoFieldForm init={{name:editNode.name,role:editNode.role}} onSave={saveGM} onCancel={()=>setEditNode(null)}/></Modal>;
    if(editNode.type==="head") return <Modal title="Edit region head" onClose={()=>setEditNode(null)}><TwoFieldForm init={{name:editNode.name,role:editNode.role}} onSave={saveHead} onCancel={()=>setEditNode(null)}/></Modal>;
    if(editNode.type==="addSR") return <Modal title="Add subregion" onClose={()=>setEditNode(null)}><AddSRForm onSave={saveAddSR} onCancel={()=>setEditNode(null)}/></Modal>;
    if(editNode.type==="addCity") return <Modal title="Add city" onClose={()=>setEditNode(null)}><Field label="City name" value={editNode.cityName} onChange={v=>setEditNode(p=>({...p,cityName:v}))}/><ModalButtons onCancel={()=>setEditNode(null)} onSave={()=>editNode.cityName&&saveAddCity(editNode.cityName)} saveLabel="Add city"/></Modal>;
    if(editNode.type==="regionName") return <Modal title="Rename region" onClose={()=>setEditNode(null)}><Field label="Region name" value={editNode.val} onChange={v=>setEditNode(p=>({...p,val:v}))}/><ModalButtons onCancel={()=>setEditNode(null)} onSave={()=>editNode.val&&saveRegionName(editNode.val)}/></Modal>;
    if(editNode.type==="srName") return <Modal title="Rename subregion" onClose={()=>setEditNode(null)}><Field label="Subregion name" value={editNode.val} onChange={v=>setEditNode(p=>({...p,val:v}))}/><ModalButtons onCancel={()=>setEditNode(null)} onSave={()=>editNode.val&&saveSRName(editNode.val)}/></Modal>;
    return null;
  };

  return (
    <div style={{overflowX:"visible",paddingBottom:20}}>
      <div ref={containerRef} style={{minWidth:1100,display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
        {/* SVG connector lines */}
        <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",overflow:"visible",zIndex:0}}>
          {lines.map(l=><line key={l.k} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke="#cbd5e1" strokeWidth="1.5"/>)}
        </svg>
        {/* GM */}
        <div ref={gmRef} style={{position:"relative",zIndex:1,background:"#312e81",borderRadius:10,padding:"10px 22px",textAlign:"center",minWidth:190}}>
          <div style={{fontSize:14,fontWeight:600,color:"#fff"}}>{org.gm.name}</div>
          <div style={{fontSize:11,color:"#a5b4fc"}}>{org.gm.role}</div>
          <div style={{display:"flex",justifyContent:"center",marginTop:4}}>
            <HCBadge count={totalRepCount()} bg="rgba(255,255,255,0.15)" color="#c7d2fe"/>
          </div>
          <button onClick={handleEditGM} style={{position:"absolute",top:5,right:7,background:"none",border:"none",cursor:"pointer",color:"#a5b4fc",fontSize:13}}>✎</button>
        </div>
        <div style={{height:22}}/>
        {/* Regions */}
        <div style={{display:"flex",gap:60,alignItems:"flex-start",justifyContent:"center",position:"relative",zIndex:1}}>
          {org.regions.map(reg=>{
            const c=C[reg.color];
            return (
              <div key={reg.id} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:7}}>
                  <div style={{background:c.pill,color:"#fff",fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",padding:"3px 14px",borderRadius:20}}>{reg.name}</div>
                  <button onClick={()=>handleEditRegionName(reg.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:12,padding:"0 2px"}}>✎</button>
                </div>
                <div ref={el=>{headRefs.current[reg.id]=el;}} style={{position:"relative",background:c.head.bg,border:"1.5px solid "+c.head.border,borderRadius:10,padding:"9px 18px",textAlign:"center",minWidth:170}}>
                  <div style={{fontSize:13,fontWeight:600,color:c.head.text}}>{reg.head.name}</div>
                  <div style={{fontSize:11,color:c.head.sub}}>{reg.head.role}</div>
                  <div style={{display:"flex",justifyContent:"center",marginTop:4}}>
                    <HCBadge count={regRepCount(reg)} bg={reg.color==="blue"?"#bfdbfe":"#a7f3d0"} color={c.head.sub}/>
                  </div>
                  <button onClick={()=>handleEditHead(reg.id)} style={{position:"absolute",top:5,right:7,background:"none",border:"none",cursor:"pointer",color:c.head.sub,fontSize:13}}>✎</button>
                </div>
                <div style={{height:24}}/>
                <div style={{display:"flex",gap:28,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"center"}}>
                  {reg.subregions.map(sr=>(
                    <Subregion key={sr.id} sr={sr} color={reg.color} regId={reg.id}
                      tlRef={el=>{tlRefs.current[reg.id+"--"+sr.id]=el;}}
                      onEditTL={handleEditTL} onClearTL={handleClearTL} onDeleteSR={handleDeleteSR}
                      onAddRep={handleAddRep} onAddCity={handleAddCity}
                      onEditCity={handleEditCity} onDeleteCity={handleDeleteCity}
                      onEditRep={handleEditRep} onDeleteRep={handleDeleteRep}
                      onEditSRName={handleEditSRName}
                      onDragStart={handleDragStart} onDrop={handleDrop}
                      onCityDragStart={handleCityDragStart} onCityDrop={handleCityDrop}
                      draggingCityId={draggingCityId} onCityDragEnd={handleCityDragEnd}/>
                  ))}
                </div>
                <button onClick={()=>handleAddSR(reg.id)} style={{marginTop:12,fontSize:11,color:c.head.sub,background:c.city.bg,border:"1px solid "+c.pill,borderRadius:5,padding:"3px 13px"}}>+ Add subregion</button>
              </div>
            );
          })}
        </div>
      </div>
      {renderModal()}
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [phases,setPhases]=useState(INITIAL_PHASES);
  const [activeId,setActiveId]=useState(INITIAL_PHASES[0].id);
  const [phaseModal,setPhaseModal]=useState(null);
  const [dupModal,setDupModal]=useState(null);
  const [zoom,setZoom]=useState(1);
  const historyRef=useRef({});
  const fileInputRef=useRef(null);
  const chartScrollRef=useRef(null);
  const [toast,setToast]=useState(null);

  const activePhase=phases.find(p=>p.id===activeId)||phases[0];
  const getHist=id=>{if(!historyRef.current[id])historyRef.current[id]={past:[],future:[]};return historyRef.current[id];};
  const hist=getHist(activeId);
  const canUndo=hist.past.length>0;
  const canRedo=hist.future.length>0;

  const handleOrgUpdate=fn=>{
    setPhases(prev=>prev.map(p=>{
      if(p.id!==activeId) return p;
      const newOrg=fn(p.org);
      const h=getHist(activeId);
      h.past.push(clone(p.org));
      h.future=[];
      return {...p,org:newOrg};
    }));
  };

  const handleUndo=()=>{
    const h=getHist(activeId); if(!h.past.length) return;
    setPhases(prev=>prev.map(p=>{if(p.id!==activeId)return p;const prev_org=h.past.pop();h.future.push(clone(p.org));return {...p,org:prev_org};}));
  };
  const handleRedo=()=>{
    const h=getHist(activeId); if(!h.future.length) return;
    setPhases(prev=>prev.map(p=>{if(p.id!==activeId)return p;const next_org=h.future.pop();h.past.push(clone(p.org));return {...p,org:next_org};}));
  };

  useEffect(()=>{
    const handler=e=>{
      const mod=e.metaKey||e.ctrlKey; if(!mod) return;
      if(e.key==="z"&&!e.shiftKey){e.preventDefault();handleUndo();}
      if((e.key==="z"&&e.shiftKey)||e.key==="y"){e.preventDefault();handleRedo();}
    };
    window.addEventListener("keydown",handler);
    return ()=>window.removeEventListener("keydown",handler);
  },[activeId,phases]);

  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  /* Phase management */
  const handleCreatePhase=({label,color})=>{const p={id:uid(),label,color,org:clone(BASE_ORG)};setPhases(prev=>[...prev,p]);setActiveId(p.id);setPhaseModal(null);};
  const handleEditPhase=({label,color})=>{setPhases(prev=>prev.map(p=>p.id===phaseModal.phase.id?{...p,label,color}:p));setPhaseModal(null);};
  const handleDeletePhase=()=>{const rem=phases.filter(p=>p.id!==phaseModal.phase.id);setPhases(rem);setActiveId(rem[0].id);setPhaseModal(null);};
  const handleDuplicate=({label,color})=>{const src=phases.find(p=>p.id===dupModal);if(!src)return;const p={id:uid(),label,color,org:clone(src.org)};setPhases(prev=>[...prev,p]);setActiveId(p.id);setDupModal(null);};

  /* Save / Load */
  const handleSave=()=>{
    const payload=JSON.stringify({version:1,activeId,phases},null,2);
    const blob=new Blob([payload],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="org-data.json"; a.click();
    URL.revokeObjectURL(url);
  };
  const handleLoad=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.phases||!Array.isArray(parsed.phases)) throw new Error("bad");
        setPhases(parsed.phases);
        setActiveId(parsed.activeId||parsed.phases[0].id);
        historyRef.current={};
        showToast("Org data loaded successfully","ok");
      } catch(err) {
        showToast("Invalid file — please use a saved org-data.json","err");
      }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const countReps=org=>{let n=0;org.regions.forEach(r=>r.subregions.forEach(s=>s.cities.forEach(c=>n+=c.reps.length)));return n;};
  const countCities=org=>{let n=0;org.regions.forEach(r=>r.subregions.forEach(s=>n+=s.cities.length));return n;};

  return (
    <div style={{height:"100vh",background:"#f0f0ed",display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* Top bar */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 20px",display:"flex",alignItems:"stretch",gap:0,flexShrink:0}}>
        <div style={{padding:"14px 16px 14px 4px",fontSize:14,fontWeight:700,color:"#1e293b",whiteSpace:"nowrap",display:"flex",alignItems:"center",borderRight:"1px solid #f1f5f9",marginRight:8}}>
          NA Sales Org
        </div>
        {/* Phase tabs */}
        <div style={{display:"flex",alignItems:"stretch",overflowX:"auto",flex:1}}>
          {phases.map(phase=>(
            <div key={phase.id} style={{display:"flex",alignItems:"stretch",flexShrink:0}}>
              <button onClick={()=>setActiveId(phase.id)} style={{padding:"0 16px",height:"100%",border:"none",borderBottom:activeId===phase.id?"3px solid "+phase.color:"3px solid transparent",background:"none",fontSize:13,fontWeight:activeId===phase.id?600:400,color:activeId===phase.id?phase.color:"#64748b",cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.15s",display:"flex",alignItems:"center",gap:7}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:phase.color,display:"inline-block",flexShrink:0}}/>
                {phase.label}
              </button>
              {activeId===phase.id&&<button onClick={()=>setPhaseModal({phase})} style={{background:"none",border:"none",cursor:"pointer",padding:"0 4px 0 0",color:"#94a3b8",fontSize:13,display:"flex",alignItems:"center"}} title="Edit phase">⚙</button>}
            </div>
          ))}
        </div>
        {/* Actions */}
        <div style={{display:"flex",alignItems:"center",gap:4,paddingLeft:12,flexShrink:0}}>
          <button onClick={handleUndo} disabled={!canUndo} title="Undo (Cmd+Z)" style={{width:30,height:30,borderRadius:6,border:"1px solid #e2e8f0",background:"#fff",fontSize:15,cursor:canUndo?"pointer":"default",color:canUndo?"#475569":"#cbd5e1",display:"flex",alignItems:"center",justifyContent:"center"}}>↩</button>
          <button onClick={handleRedo} disabled={!canRedo} title="Redo (Cmd+Shift+Z)" style={{width:30,height:30,borderRadius:6,border:"1px solid #e2e8f0",background:"#fff",fontSize:15,cursor:canRedo?"pointer":"default",color:canRedo?"#475569":"#cbd5e1",display:"flex",alignItems:"center",justifyContent:"center",marginRight:4}}>↪</button>
          <div style={{width:1,height:20,background:"#e2e8f0",margin:"0 4px"}}/>
          <button onClick={handleSave} style={{fontSize:12,color:"#fff",background:"#059669",border:"none",borderRadius:6,padding:"5px 11px",whiteSpace:"nowrap",cursor:"pointer"}}>↓ Save</button>
          <button onClick={()=>fileInputRef.current.click()} style={{fontSize:12,color:"#475569",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 11px",whiteSpace:"nowrap",cursor:"pointer"}}>↑ Load</button>
          <input ref={fileInputRef} type="file" accept=".json" onChange={handleLoad} style={{display:"none"}}/>
          <div style={{width:1,height:20,background:"#e2e8f0",margin:"0 4px"}}/>
          <button onClick={()=>setDupModal(activeId)} style={{fontSize:12,color:"#475569",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 11px",whiteSpace:"nowrap"}}>⧉ Duplicate</button>
          <button onClick={()=>setPhaseModal("new")} style={{fontSize:12,color:"#fff",background:"#1e293b",border:"none",borderRadius:6,padding:"5px 11px",whiteSpace:"nowrap"}}>+ New phase</button>
        </div>
      </div>

      {/* Banner */}
      <div style={{padding:"8px 20px",background:"#f8fafc",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <span style={{width:10,height:10,borderRadius:"50%",background:activePhase.color,display:"inline-block"}}/>
        <span style={{fontSize:13,fontWeight:500,color:"#334155"}}>{activePhase.label}</span>
        <button onClick={()=>setPhaseModal({phase:activePhase})} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:13,padding:"0 2px",lineHeight:1}}>✎</button>
        <span style={{fontSize:11,color:"#94a3b8"}}>— {countReps(activePhase.org)} reps across {countCities(activePhase.org)} cities</span>
        {/* Zoom */}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11,color:"#94a3b8",marginRight:4}}>Ctrl+scroll to zoom · Shift+scroll to pan</span>
          <button onClick={()=>setZoom(z=>Math.max(0.3,+(z-0.1).toFixed(1)))} style={{width:28,height:28,borderRadius:6,border:"1px solid #e2e8f0",background:"#fff",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#475569",fontWeight:500}}>−</button>
          <span style={{fontSize:12,color:"#64748b",minWidth:38,textAlign:"center"}}>{Math.round(zoom*100)}%</span>
          <button onClick={()=>setZoom(z=>Math.min(2,+(z+0.1).toFixed(1)))} style={{width:28,height:28,borderRadius:6,border:"1px solid #e2e8f0",background:"#fff",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#475569",fontWeight:500}}>+</button>
          <button onClick={()=>setZoom(1)} style={{fontSize:11,color:"#64748b",background:"none",border:"1px solid #e2e8f0",borderRadius:5,padding:"3px 8px",cursor:"pointer",marginLeft:2}}>Reset</button>
        </div>
      </div>

      {/* Legend */}
      <div style={{padding:"6px 20px",background:"#fff",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:16,flexShrink:0,flexWrap:"wrap"}}>
        <span style={{fontSize:11,fontWeight:500,color:"#94a3b8",letterSpacing:"0.05em",textTransform:"uppercase"}}>Legend</span>
        {REP_TAGS.filter(t=>t.id!==null).map(t=>(
          <div key={t.id} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:14,height:14,borderRadius:3,background:t.bg,border:"1px solid "+t.border,borderLeft:"3px solid "+t.dot,flexShrink:0}}/>
            <span style={{fontSize:11,color:"#475569",whiteSpace:"nowrap"}}>{t.label}</span>
          </div>
        ))}
      </div>

      {/* Chart scroll area */}
      <div ref={chartScrollRef} style={{flex:1,overflow:"auto"}}
        onWheel={e=>{
          if(e.ctrlKey||e.metaKey){e.preventDefault();setZoom(z=>Math.min(2,Math.max(0.3,+(z-e.deltaY*0.001).toFixed(2))));}
          else if(e.shiftKey){e.preventDefault();e.currentTarget.scrollLeft+=e.deltaY;}
        }}>
        <div style={{padding:"24px 40px 80px",display:"inline-block",minWidth:"100%"}}>
          <div style={{transform:"scale("+zoom+")",transformOrigin:"top left",transition:"transform 0.1s",display:"inline-block",minWidth:1100}}>
            <OrgView key={activeId} org={activePhase.org} onUpdate={handleOrgUpdate}/>
          </div>
        </div>
      </div>

      {/* Modals */}
      {phaseModal==="new"&&<PhaseModal onSave={handleCreatePhase} onClose={()=>setPhaseModal(null)} phases={phases}/>}
      {phaseModal&&phaseModal.phase&&<PhaseModal phase={phaseModal.phase} onSave={handleEditPhase} onClose={()=>setPhaseModal(null)} onDelete={handleDeletePhase} isOnly={phases.length===1} phases={phases}/>}
      {dupModal&&<DuplicateModal sourceLabel={phases.find(p=>p.id===dupModal)?.label||""} phases={phases} onSave={handleDuplicate} onClose={()=>setDupModal(null)}/>}

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.type==="ok"?"#059669":"#ef4444",color:"#fff",fontSize:13,fontWeight:500,padding:"10px 20px",borderRadius:8,boxShadow:"0 4px 16px rgba(0,0,0,0.15)",zIndex:9999,whiteSpace:"nowrap"}}>
          {toast.type==="ok"?"✓ ":"✗ "}{toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
